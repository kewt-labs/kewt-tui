[versions]
coroutines = "1.11.0"
detekt = "2.0.0-alpha.3"
dokka = "2.2.0"
faireDetekt = "0.5.3"
kotlin = "2.3.21"
kover = "0.9.8"
ktlint = "1.8.0"
spotless = "8.5.1"

[libraries]
faire-detekt-rules = { module = "com.faire:faire-detekt-rules", version.ref = "faireDetekt" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }

# Gradle Plugin
detekt-gradlePlugin = { module = "dev.detekt:detekt-gradle-plugin", version.ref = "detekt" }
dokka-gradlePlugin = { module = "org.jetbrains.dokka:org.jetbrains.dokka.gradle.plugin", version.ref = "dokka" }
kotlin-gradlePlugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
kover-gradlePlugin = { module = "org.jetbrains.kotlinx.kover:org.jetbrains.kotlinx.kover.gradle.plugin", version.ref = "kover" }
spotless-gradlePlugin = { module = "com.diffplug.spotless:com.diffplug.spotless.gradle.plugin", version.ref = "spotless" }

[bundles]

[plugins]
detekt = { id = "dev.detekt", version.ref = "detekt" }
dokka = { id = "org.jetbrains.dokka", version.ref = "dokka" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

# Plugins generated by project
kewt-example-application = {id="kewt.example.application"}
kewt-kmp-library = { id = "kewt.kmp.library" }
kewt-quality = { id = "kewt.quality" }
kewt-root = { id = "kewt.root" }